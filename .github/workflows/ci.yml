name: CI

on:
  push:
    branches:
      main
  pull_request:

permissions:
  contents: write # for merging the PR and creating the release
  pull-requests: write # for creating the version PR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  phpTests:
    name: PHP ${{ matrix.php }} Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Shared Setup
        uses: ./.github/actions/shared-setup
        with:
          php-version: ${{ matrix.php }}

      - name: Start wp-env-test container
        env:
          WP_ENV_PHP_VERSION: ${{ matrix.php }}
          WP_ENV_CORE: 'WordPress/WordPress'
        run: |
          pnpm run wp-env-test start
          pnpm run wp-env-test:cli php --version
          pnpm run wp-env-test:cli wp core version

      - name: Run PHPStan Tests
        run: composer analyse

      - name: Run Pest Tests
        run: |
          pnpm run test:pest:ci

  e2eTests:
    name: E2E Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Shared Setup
        uses: ./.github/actions/shared-setup
        with:
          php-version: 8.3
          playwright: true

      - name: Start wp-env container
        env:
          WP_ENV_PHP_VERSION: 8.3
          WP_ENV_CORE: 'WordPress/WordPress'
        run: |
          pnpm run wp-env start
          pnpm run wp-env:cli php --version
          pnpm run wp-env:cli wp core version

      - name: Run E2E Tests
        run: |
          pnpm run test:e2e

      - uses: daun/playwright-report-summary@1229105480a2a4bdd91598d8a146fbab41343fce # v3.11.0
        if: always()
        with:
          report-file: playwright-results.json
